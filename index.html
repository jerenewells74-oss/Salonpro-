/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #0a0f1e; }
::-webkit-scrollbar-thumb { background: #2a3347; border-radius: 2px; }

/* ── TOUCH — eliminar delay y highlight en todos los elementos táctiles ── */
button, a, label, [role="button"] {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
}

/* ── BOTONES — mínimo 44px de alto para touch targets ── */
button { min-height: 44px; }

/* ── TRASH BTN ── */
.trash-btn {
  width: 44px; height: 44px;
  border-radius: 3px;
  border: 1.5px solid #2a3347;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.trash-btn:active { background: #f8717130; border-color: #f87171; }
@media (hover: hover) {
  .trash-btn:hover { background: #f8717118; border-color: #f87171; box-shadow: 0 0 12px #f8717133; }
  .trash-btn:hover .trash-svg { fill: #f87171; }
}
.trash-svg { width: 16px; height: 16px; fill: #4a6070; transition: fill .15s; }

/* ── CHECKLIST ── */
.checklist-cb { display: none; }
.checklist-label {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  cursor: pointer;
  background: #1d2535;
  border-radius: 4px;
  border: 1px solid #2a3347;
  margin-bottom: 8px;
  transition: background .2s, border-color .2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-height: 56px;
}
.checklist-label:active { background: #34d39910; }
@media (hover: hover) { .checklist-label:hover { border-color: #34d39966; background: #34d39908; } }
.checklist-box {
  width: 24px; height: 24px; flex-shrink: 0;
  border: 2px solid #2a3347; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; background: #0a0f1e;
}
.checklist-cb:checked + .checklist-label .checklist-box { background: #34d399; border-color: #34d399; box-shadow: 0 0 10px #34d39933; }
.checklist-cb:checked + .checklist-label .checklist-text { text-decoration: line-through; color: #4a6070; }
.checklist-cb:checked + .checklist-label { opacity: .55; }
.check-icon { opacity: 0; transform: scale(0); transition: all .18s; }
.checklist-cb:checked + .checklist-label .check-icon { opacity: 1; transform: scale(1); }

/* ── FLIP CARD — 100% controlado por React state, sin :hover ── */
.flip-card { perspective: 1000px; -webkit-tap-highlight-color: transparent; }
.flip-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  -webkit-transition: -webkit-transform 0.55s cubic-bezier(.4,0,.2,1);
}
.flip-card.flipped .flip-inner {
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}
.flip-front, .flip-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 4px;
  overflow: hidden;
}
.flip-back { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }

/* ── NAVBAR BOTTOM para móvil ── */
@media (max-width: 600px) {

function Eventos({data,setData,user}) {
const ef={cliente:””,telefono:””,fecha:””,tipo:””,invitados:””,notas:””};
const [sf,setSf]=useState(false);
const [form,setForm]=useState(ef);
const [mf,setMf]=useState({});
const [emId,setEmId]=useState(null);
const [emD,setEmD]=useState({});
const hoy=new Date().toISOString().split(“T”)[0];

const trash=ev=>setData(d=>({…d,eventos:d.eventos.filter(e=>e.id!==ev.id),papelera:[…(d.papelera||[]),{item:ev,tipo:“evento”,eliminadoPor:user.name,fechaEliminacion:Date.now()}]}));
const guardar=()=>{
if(!form.fecha||!form.cliente||!form.tipo)return;
setData(d=>({…d,eventos:[…d.eventos,{…form,id:Date.now(),creadoPor:user.name,menu:mf}]}));
setForm(ef);setMf({});setSf(false);
};
const saveM=id=>{setData(d=>({…d,eventos:d.eventos.map(e=>e.id===id?{…e,menu:emD}:e)}));setEmId(null);};
const prox=data.eventos.filter(e=>e.fecha>=hoy).sort((a,b)=>a.fecha.localeCompare(b.fecha));
const pas=data.eventos.filter(e=>e.fecha<hoy).sort((a,b)=>b.fecha.localeCompare(a.fecha));

const ResM=({menu})=>{
if(!menu||!Object.keys(menu).length)return<span style={{color:T.inkLight,fontSize:12}}>Sin menú</span>;
const it=[];
if(menu.tipoMenu)it.push(menu.tipoMenu);
if(menu.primerPlato)it.push(menu.primerPlato);
if(menu.postre)it.push(menu.postre);
const ne=Object.keys(menu.especiales||{}).length;
if(ne>0)it.push(`${ne} esp.`);
return<span style={{color:T.inkMid,fontSize:12}}>{it.join(” · “)}</span>;
};

const EC=({ev,past})=>{
const tipo=TIPO_EVENTO.find(t=>t.v===ev.tipo);
const isEM=emId===ev.id;
return<Card accent={past?T.border:(tipo?.color||T.blue)} style={{marginBottom:12}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,gap:10}}>
<div style={{flex:1,minWidth:0}}>
<div style={{display:“flex”,gap:8,alignItems:“center”,marginBottom:6,flexWrap:“wrap”}}>
<span style={{fontWeight:700,fontSize:16,color:T.inkBright}}>{ev.cliente}</span>
{tipo&&<Tag color={past?T.inkLight:tipo.color}>{tipo.l}</Tag>}
{past&&<Tag color={T.inkLight}>Realizado</Tag>}
</div>
<div style={{display:“flex”,gap:12,flexWrap:“wrap”,color:T.inkMid,fontSize:13}}>
<span>📅 {new Date(ev.fecha+“T12:00:00”).toLocaleDateString(“es-AR”,{day:“2-digit”,month:“long”,year:“numeric”})}</span>
{ev.invitados&&<span>👥 {ev.invitados}</span>}
</div>
{ev.telefono&&<div style={{color:T.inkMid,fontSize:13,marginTop:2}}>📞 {ev.telefono}</div>}
<div style={{marginTop:6}}><ResM menu={ev.menu}/></div>
{ev.creadoPor&&<div style={{color:T.inkLight,fontSize:11,marginTop:4}}>Por {ev.creadoPor}</div>}
</div>
<div style={{display:“flex”,gap:8,alignItems:“center”,flexShrink:0}}>
<Btn small variant=“outline” onClick={()=>{if(isEM){setEmId(null);return;}setEmId(ev.id);setEmD(ev.menu||{});}}>{isEM?“✕”:“🍽️”}</Btn>
<TrashBtn onClick={()=>trash(ev)}/>
</div>
</div>
{isEM&&<div style={{marginTop:14,borderTop:`1px solid ${T.border}`,paddingTop:14}}>
<MenuForm menu={emD} setMenu={setEmD}/>
<div style={{marginTop:14}}><Btn onClick={()=>saveM(ev.id)} full>💾 Guardar menú</Btn></div>
</div>}
</Card>;
};

return<div>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:18}}>
<div style={{fontSize:20,fontWeight:800,color:T.inkBright}}>🎉 Eventos</div>
<Btn onClick={()=>{setSf(!sf);setForm(ef);setMf({});}}>{sf?“Cancelar”:”+ Nuevo”}</Btn>
</div>
{sf&&<Card style={{borderColor:T.blue+“44”,marginBottom:20}} glow={T.blueGlow}>
<div style={{fontWeight:800,color:T.blue,marginBottom:14,fontSize:15}}>Nuevo evento</div>
<Field label="Tipo de evento *" style={{marginBottom:14}}>
<div style={{display:“flex”,gap:8,flexWrap:“wrap”}}>
{TIPO_EVENTO.map(t=><Chip key={t.v} label={t.l} selected={form.tipo===t.v} color={t.color} onClick={()=>setForm(f=>({…f,tipo:f.tipo===t.v?””:t.v}))}/>)}
</div>
</Field>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:12,marginBottom:12}}>
<Field label="Cliente *"><Inp value={form.cliente} onChange={v=>setForm(f=>({…f,cliente:v}))} placeholder=“Nombre”/></Field>
<Field label="Teléfono"><Inp value={form.telefono} onChange={v=>setForm(f=>({…f,telefono:v}))} placeholder=“Teléfono”/></Field>
</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:12,marginBottom:12}}>

<Field label="Invitados"><Inp type=“number” value={form.invitados} onChange={v=>setForm(f=>({…f,invitados:v}))} placeholder=“Ej: 200”/></Field>
</div>
<Field label="Notas" style={{marginBottom:14}}><Inp value={form.notas} onChange={v=>setForm(f=>({…f,notas:v}))} placeholder=“Observaciones…”/></Field>
<Divider label="Menú del evento"/>
<MenuForm menu={mf} setMenu={setMf}/>
<div style={{marginTop:14}}>
<Btn full onClick={guardar} style={{opacity:(!form.cliente||!form.fecha||!form.tipo)?.5:1}}>Guardar evento</Btn>
</div>
</Card>}
{prox.length>0&&<><Divider label="Próximos"/>{prox.map(e=><EC key={e.id} ev={e}/>)}</>}

  </div>;

function App() {

useEffect(()=>{
setData(d=>{
const now=Date.now();
const p=(d.papelera||[]).filter(x=>(now-x.fechaEliminacion)<DIAS_PAPELERA*86400000);
if(p.length===(d.papelera||[]).length)return d;
return{…d,papelera:p};
});
},[]);

const logout=()=>{setUser(null);clearSession();};

const p=data.papelera[idx];
setData(d=>{
const pap=d.papelera.filter((_,i)=>i!==idx);
if(p.tipo===“evento”)return{…d,papelera:pap,eventos:[…d.eventos,p.item]};

return{…d,papelera:pap};
});
};

const fu=data.faltantes.filter(f=>!f.pedido&&f.urgencia===“alta”).length;
const sa=STOCK_CATS.reduce((a,c)=>a+(data.stock[c.id]||[]).filter(s=>s.minimo&&Number(s.cantidad)<=Number(s.minimo)).length,0);

{showPap&&<PapeleraModal papelera={data.papelera||[]} onRestore={restore} onDelete={delPap} onClose={()=>setShowPap(false)}/>}
